<svg width="100%" viewBox="0 0 680 230" xmlns="http://www.w3.org/2000/svg">
  <style>
    .qsb { fill: #5DCAA5; }
    .qss { stroke: #444441; stroke-width: 0.5; fill: none; }
    .qsn { font-family: Georgia, 'Times New Roman', serif; font-size: 42px; font-weight: 400; fill: #e8e6e0; letter-spacing: 0.5px; }
    .qst { font-family: 'Courier New', Courier, monospace; font-size: 11px; fill: #888780; letter-spacing: 0.4px; }
  </style>

  <!-- Dark background -->
  <rect x="0" y="0" width="680" height="230" fill="#1a1a18"/>

  <!-- Mark: 7 logarithmically scaled bars -->
  <rect class="qsb" x="96" y="64"  width="8"   height="4" rx="2" opacity="0.22"/>
  <rect class="qsb" x="92" y="79"  width="16"  height="4" rx="2" opacity="0.36"/>
  <rect class="qsb" x="86" y="94"  width="28"  height="4" rx="2" opacity="0.52"/>
  <rect class="qsb" x="78" y="109" width="44"  height="4" rx="2" opacity="0.67"/>
  <rect class="qsb" x="69" y="124" width="62"  height="4" rx="2" opacity="0.80"/>
  <rect class="qsb" x="59" y="139" width="82"  height="4" rx="2" opacity="0.92"/>
  <rect class="qsb" x="48" y="154" width="104" height="4" rx="2" opacity="1"/>

  <!-- Divider -->
  <line class="qss" x1="178" y1="48" x2="178" y2="172"/>

  <!-- Wordmark -->
  <text class="qsn" x="198" y="112">quiet</text>
  <text class="qsn" x="198" y="160">scale</text>

  <!-- Tagline -->
  <text class="qst" x="198" y="192">build things that scale so well they don't need to shout.</text>
</svg>
